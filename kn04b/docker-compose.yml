version: '3.9'

services:

  db:
    image: emanfarukmujanovic/m347:kn02b-db
    container_name: kn04b-db

    networks:
      kn04b-net:

  web:
    image: emanfarukmujanovic/m347:kn02b-web
    container_name: kn04b-web

    ports:
      - "8083:80"

    networks:
      kn04b-net:

networks:
  kn04b-net:
    ipam:
      config:
        - subnet: 172.20.0.0/16
          ip_range: 172.20.5.0/24
          gateway: 172.20.5.254