#cloud-config

ssh_authorized_keys:
  - ssh-rsa 
  - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEIx9aMRR6TGFi9ORIK9zcSkENNjjwRXC5Y/mnE6xKdR emanfarukmujanovic@MacBookPro.tbz.local

package_update: true

packages:
  - curl
  - ca-certificates

write_files:

  - path: /opt/m347/docker-compose.yml
    permissions: '0644'
    content: |
      version: '3.9'

      services:

        web:
          build:
            context: .
            dockerfile: Dockerfile
          container_name: m347-kn04-cloud-web
          ports:
            - "80:80"
          depends_on:
            - db
          networks:
            - kn04-cloud-net

        db:
          image: mariadb:latest
          container_name: m347-kn04-cloud-db
          environment:
            MARIADB_ROOT_PASSWORD: Test1234!
            MARIADB_DATABASE: m347db
          networks:
            - kn04-cloud-net

      networks:
        kn04-cloud-net:
          driver: bridge
          ipam:
            config:
              - subnet: 172.30.0.0/16
                ip_range: 172.30.5.0/24
                gateway: 172.30.5.254

  - path: /opt/m347/Dockerfile
    permissions: '0644'
    content: |
      FROM php:8.0-apache

      RUN docker-php-ext-install mysqli

      COPY info.php /var/www/html/
      COPY db.php /var/www/html/

      EXPOSE 80

  - path: /opt/m347/info.php
    permissions: '0644'
    content: |
      <?php

      phpinfo();

      ?>

  - path: /opt/m347/db.php
    permissions: '0644'
    content: |
      <?php

      $host = "db";
      $user = "root";
      $pass = "Test1234!";
      $db   = "m347db";

      $conn = new mysqli($host, $user, $pass, $db);

      if ($conn->connect_error) {
          die("Connection failed: " . $conn->connect_error);
      }

      echo "Verbindung zur Datenbank erfolgreich auf Host " . $host . "<br><br>";

      $sql = "SELECT Host, User FROM mysql.user;";
      $result = $conn->query($sql);

      while ($row = $result->fetch_assoc()) {
          echo $row["Host"] . " / " . $row["User"] . "<br>";
      }

      $conn->close();

      ?>

runcmd:
  - curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
  - sh /tmp/get-docker.sh
  - systemctl enable --now docker
  - usermod -aG docker ubuntu
  - mkdir -p /opt/m347
  - cd /opt/m347 && docker compose up -d --build

final_message: "Cloud-Init fertig. Die Anwendung läuft unter http://<PUBLIC-IP>/info.php und http://<PUBLIC-IP>/db.php"